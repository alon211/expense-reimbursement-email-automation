version: '3.8'

services:
  email-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-automation-service
    restart: unless-stopped
    environment:
      # 邮箱配置
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - MAIL_CHECK_FOLDER=${MAIL_CHECK_FOLDER:-INBOX}
      - MAIL_SEARCH_CRITERIA=${MAIL_SEARCH_CRITERIA:-UNSEEN}

      # 定时配置
      - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
      - TIME_ZONE=${TIME_ZONE:-Asia/Shanghai}

      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=./logs

      # 推送配置
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
      - DINGTALK_SECRET=${DINGTALK_SECRET}
      - PUSH_SWITCH=${PUSH_SWITCH:-True}

      # 解析和存储配置
      - PARSE_RULES_JSON_PATH=./rules/parse_rules.json
      - EXTRACT_ROOT_DIR=./extracted_mails
      - CLEAR_DB_ON_STARTUP=${CLEAR_DB_ON_STARTUP:-False}

    volumes:
      # 日志目录持久化
      - ./logs:/app/logs
      # 提取文件持久化
      - ./extracted_mails:/app/extracted_mails
      # 规则配置文件（可修改）
      - ./rules:/app/rules

    # 时区配置
    tz: Asia/Shanghai

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
